<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Raj Kumar Singh | Contractor</title>

<style>

/* BACKGROUND */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #000000, #1a1a1a, #0b1f3a);
    color: white;
    text-align: center;
}

/* GLOW */
body::before {
    content: "";
    position: fixed;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(0,150,255,0.3), transparent);
    top: -100px;
    left: -100px;
    animation: glowMove 8s infinite alternate;
    z-index: -1;
}

@keyframes glowMove {
    0% { transform: translate(0,0); }
    100% { transform: translate(200px,200px); }
}

/* CARD */
.card {
    max-width: 400px;
    margin: 30px auto;
    padding: 25px;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    box-shadow: 0 0 30px rgba(0,150,255,0.4);
    animation: fadeIn 1.2s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(30px);}
    to { opacity: 1; transform: translateY(0);}
}

/* LOGO */
.logo {
    width: 120px;
    margin-bottom: 10px;
}

/* NAME */
h1 {
    margin: 10px 0;
    font-size: 24px;
}

/* TEXT */
p {
    color: #ccc;
    font-size: 14px;
}

/* BUTTON */
.btn {
    display: block;
    margin: 10px auto;
    padding: 12px;
    width: 90%;
    border-radius: 30px;
    text-decoration: none;
    font-weight: bold;
    color: white;
    background: linear-gradient(90deg, #00c6ff, #0072ff);
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px #00c6ff;
}

/* SERVICES */
.services {
    margin-top: 15px;
    font-size: 14px;
    color: #bbb;
}

/* QR */
.qr {
    width: 140px;
    margin-top: 15px;
}

/* FOOTER */
.footer {
    margin-top: 15px;
    font-size: 12px;
    color: #aaa;
}

</style>

</head>

<body>

<div class="card">

<!-- LOGO -->
<img src="logo.png" class="logo">

<!-- NAME -->
<h1>Raj Kumar Singh</h1>

<p><b>Government Contractor</b></p>
<p>General Order Supplier</p>

<p><b>Trusted Work • Quality Service • Timely Delivery</b></p>

</div>

</div>

</body>
</html>
